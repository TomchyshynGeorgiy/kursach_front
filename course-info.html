<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Про курс | GO STUDY</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="dashboard-body">

    <header class="navbar">
        <div class="logo"><span>≡</span> GO STUDY</div>
        <nav>
            <a href="index.html">Головна</a>
            <a href="profile.html">Кабінет</a>
        </nav>
    </header>

    <main style="max-width: 800px; width: 100%; margin: 40px auto; padding: 0 20px; box-sizing: border-box;">
        <div class="features-box" style="width: 100%; margin-bottom: 30px; text-align: center; border-top: 4px solid #00ADD8; box-sizing: border-box;">
            <h1 id="courseTitleHeading" style="font-size: 32px; margin-bottom: 15px; color: #F1F5F9;">Завантаження курсу...</h1>

            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; color: #fbbf24; font-size: 14px;">
                <span>📚 Онлайн-курс</span>
                <span>📊 Прогрес зберігається</span>
            </div>

            <p id="courseDescription" style="color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 30px; max-width: 650px; margin-left: auto; margin-right: auto;"></p>

            <button id="continueCourseBtn" type="button" style="display: inline-block; background-color: #00ADD8; color: #0f172a; text-decoration: none; font-weight: bold; font-size: 16px; padding: 14px 40px; border-radius: 8px; transition: background-color 0.3s ease; box-shadow: 0 4px 15px rgba(0, 173, 216, 0.3); border: none; cursor: pointer;">🚀 Почати навчання</button>
        </div>

        <section style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 20px;">
            <h2 style="font-size: 24px; margin-bottom: 25px; color: #F1F5F9; text-align: center;">Програма курсу</h2>
            <div id="courseSyllabus" style="width: 100%;">
                <div class="features-box" style="margin: 0 auto 15px auto; padding: 25px; box-sizing: border-box; width: 100%; max-width: 650px; color: #94a3b8;">
                    Завантаження програми...
                </div>
            </div>
        </section>
    </main>

</body>
</html>
