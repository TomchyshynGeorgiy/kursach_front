<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кабінет студента</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="profile-card">
        <div class="progress-container" style="background: #ddd; border-radius: 10px; width: 100%; height: 10px; margin: 15px 0;">
        <div class="progress-bar" style="background: #28a745; width: 45%; height: 100%; border-radius: 10px;"></div>
        </div>
        <p style="font-size: 14px;">Ваш прогрес: 50%</p>
        <h1>Вітаємо, Георгію!</h1>
        <p>Ваш навчальний прогрес: проходить аналізування</p>
        <div id="course-content">
            <p>Завантаження вмісту курсу...</p>
        </div>
        <button onclick="window.location.href='index.html'">Вийти</button>
    </div>
    <script>
    // Коли сторінка завантажилася, беремо ім'я з пам'яті
    const savedName = localStorage.getItem('userName');
    if (savedName) {
        // Знаходимо заголовок і міняємо текст у ньому
        document.querySelector('h1').textContent = "Вітаємо, " + savedName + "!";
    }
    </script>
</body>
</html>
