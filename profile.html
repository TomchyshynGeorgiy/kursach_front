<!DOCTYPE html>
<html lang="uk">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет | GO STUDY</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="script.js" defer></script>
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="logo"><span>≡</span> GO STUDY</div>
            <nav class="sidebar-nav">
                <a href="#" class="active">📊 Дашборд</a>
                <a href="#">📚 Мої курси</a>
                <a href="#">⚙️ Налаштування</a>
            </nav>
            <button onclick="window.location.href='index.html'" class="logout-btn">🚪 Вийти</button>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Вітаємо, Студенте! 👋</h1>
                <p>Ваш поточний прогрес навчання</p>
            </header>

            <div class="stats-overview">
                <h3>Загальний прогрес</h3>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 45%;"></div>
                </div>
                <p style="margin-top: 10px; color: #94a3b8;">45% Завершено</p>
            </div>

            <h2 class="section-title">Ваші курси</h2>
            <div class="course-grid" id="courseGrid">
            </div>
        </main>

    </div>

    <script>
        const savedName = localStorage.getItem('userName');
        if (savedName) {
            document.querySelector('.content-header h1').textContent = "Вітаємо, " + savedName + "! 👋";
        }
    </script>
</body>
</html>
