<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет | GO STUDY</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo"><span>≡</span> GO STUDY</div>
            <nav class="sidebar-nav">
                <a href="#" id="dashboardTab" class="active">📊 Дашборд</a>
                <a href="#" id="myCoursesTab">📚 Мої курси</a>
                <a href="#" id="settingsTab">⚙️ Налаштування</a>
                <a href="admin.html" id="adminLink" style="color: #94a3b8; margin-top: 20px;">👑 Адмін-панель</a>
            </nav>
            <button type="button" data-logout class="logout-btn">🚪 Вийти</button>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1 id="profileHeading">Доступні курси 🚀</h1>
                <div class="user-profile">
                    <span id="profileName">Студент</span>
                    <div class="avatar">S</div>
                </div>
            </header>

            <div id="profileContent" class="courses-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px;"></div>
        </main>
    </div>

</body>
</html>
