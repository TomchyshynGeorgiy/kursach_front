<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет студента</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="profile-card">
            <h1>Вітаємо, Студенте!</h1>
            
            <p>Ваш загальний прогрес навчання:</p>
            <div class="progress-container">
                <div class="progress-bar" style="width: 45%;"></div>
            </div>
            <p style="font-size: 14px; margin-bottom: 20px;">Завершено: 45%</p>

            <div id="course-list">
                <div class="course-card">
                    <h3>Основи HTML/CSS</h3>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: 80%;"></div>
                    </div>
                    <p>Прогрес: 80%</p>
                </div>

                <div class="course-card">
                    <h3>JavaScript для початківців</h3>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: 30%;"></div>
                    </div>
                    <p>Прогрес: 30%</p>
                </div>
                
                <div class="course-card">
                    <h3>Робота з Git та GitHub</h3>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: 100%; background: #28a745;"></div>
                    </div>
                    <p>Виконано! ✅</p>
                </div>
            </div>

            <button onclick="window.location.href='index.html'" style="margin-top: 20px;">Вийти</button>
        </div>
    </div>

    <script>
        // Беремо ім'я користувача з пам'яті браузера
        const savedName = localStorage.getItem('userName');
        if (savedName) {
            // Оновлюємо заголовок персональним привітанням
            document.querySelector('h1').textContent = "Вітаємо, " + savedName + "!";
        }
    </script>
</body>
</html>
