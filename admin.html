<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель | GO STUDY</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo"><span>≡</span> GO STUDY</div>
            <nav class="sidebar-nav">
                <a href="profile.html">📊 Дашборд</a>
                <a href="#">📚 Мої курси</a>
                <a href="#">⚙️ Налаштування</a>
                <a href="admin.html" class="active" style="color: #eef0f4;">👑 Адмін-панель</a>
            </nav>
            <button onclick="window.location.href='index.html'" style="margin-top: auto; background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 8px; cursor: pointer;">🚪 Вийти</button>
        </aside>

        <main class="main-content" style="display: flex; flex-direction: column; align-items: center; padding-top: 50px;">
            
            <div class="content-header" style="text-align: center; border-bottom: none; margin-bottom: 30px; width: 100%;">
                <h1 style="font-size: 32px; margin-bottom: 10px;">Панель адміністратора 🛠️</h1>
                <p style="color: #94a3b8; margin: 0; font-size: 16px;">Додавання нових курсів до бази даних</p>
            </div>

            <div class="features-box" style="margin: 0 auto; max-width: 420px; width: 100%; padding: 30px; box-sizing: border-box;">
               <form id="addCourseForm" style="width: 100%; display: flex; flex-direction: column;">
                    <h3 style="color:  #00ADD8; margin-bottom: 25px; font-size: 22px; text-align: center;">Новий курс</h3>
                    
                    <input type="text" id="courseTitle" placeholder="Назва курсу (напр. Основи Go)" required style="width: 100%; max-width: 100%; margin-bottom: 15px; box-sizing: border-box;">
                    
                    <textarea id="courseDesc" placeholder="Детальний опис курсу..." required rows="4" style="width: 100%; max-width: 100%; margin-bottom: 15px; box-sizing: border-box; background-color: #1e293b; border: 1px solid #334155; color: #F1F5F9; border-radius: 8px; padding: 12px; font-family: inherit; resize: vertical;"></textarea>

                    <button type="submit" style="background-color: #00ADD8; color: #0f172a; font-weight: bold; width: 100%; max-width: 100%; margin-top: 10px;">➕ Створити курс</button>
                </form>
            </div>
            
        </main>
    </div>

</body>
</html>
